{{ define "content" }}
<div class="max-w-4xl mx-auto py-10">
    <div class="flex justify-between items-end mb-10 pb-8 border-b border-slate-100">
        <div>
            <p class="text-xs font-bold text-primary uppercase tracking-widest mb-2 flex items-center gap-2">
                <i data-lucide="history" size="14"></i>
                Archived Version
            </p>
            <h1 class="text-3xl font-bold text-slate-900 mb-1">{{ .Title }}</h1>
            <p class="text-slate-400 text-sm">Captured on {{ .Revision.CreatedAt.Format "January 02, 2006 at 15:04" }}</p>
        </div>
        <form action="/revisions/rollback" method="POST" class="m-0">
            <input type="hidden" name="revision_id" value="{{ .Revision.ID }}">
            <button type="submit" class="btn btn-primary h-12 px-8 rounded-xl shadow-lg gap-3">
                <i data-lucide="rotate-ccw" size="18"></i>
                Restore to This State
            </button>
        </form>
    </div>

    <div class="bg-slate-900 rounded-3xl shadow-2xl p-10 border border-slate-800">
        <div class="flex items-center gap-4 mb-8 border-b border-slate-800 pb-6">
            <div class="w-3 h-3 rounded-full bg-red-400"></div>
            <div class="w-3 h-3 rounded-full bg-amber-400"></div>
            <div class="w-3 h-3 rounded-full bg-emerald-400"></div>
            <span class="text-xs font-mono text-slate-500 ml-2 uppercase tracking-widest">Snapshot View</span>
        </div>
        <pre class="font-mono text-sm leading-relaxed text-slate-300 overflow-x-auto whitespace-pre-wrap">{{ .Revision.Content }}</pre>
    </div>
    
    <div class="mt-10 text-center">
        <a href="/revisions?doc_id={{ .Revision.DocumentID }}" class="btn btn-ghost text-slate-400">
            <i data-lucide="arrow-left" size="16"></i>
            Back to Timeline
        </a>
    </div>
</div>

<script>
    lucide.createIcons();
</script>
{{ end }}
