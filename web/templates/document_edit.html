{{ define "content" }}
<div class="doc-editor-container h-full flex flex-col">
    <div class="doc-editor-header flex items-center justify-between py-8 mb-10 border-b border-border">
        <div class="flex items-center gap-8 flex-1">
            <a href="{{ if .FolderID }}/?folder_id={{ .FolderID }}{{ else }}/{{ end }}" class="btn btn-secondary btn-sm p-3">
                <i data-lucide="arrow-left" size="18"></i>
            </a>
            <div class="flex-1 max-w-4xl">
                <input type="text" form="doc-form" name="title" value="{{ .Title }}" class="bg-transparent border-none text-4xl font-extrabold text-main w-full focus:outline-none focus:ring-0 placeholder-slate-700 tracking-tight" placeholder="Document Title..." required autofocus>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div id="save-status" class="text-xs font-bold uppercase tracking-widest text-dim px-3 py-1 bg-surface-light rounded-full"></div>
            <button type="submit" form="doc-form" class="btn btn-primary h-12 px-10 rounded-xl shadow-xl">
                {{ if .ID }}Publish Changes{{ else }}Create Document{{ end }}
            </button>
        </div>
    </div>

    <div class="doc-editor-workspace flex-1 overflow-y-auto bg-slate-950 rounded-3xl border border-border p-12 relative">
        <div class="editor-bg-glow absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-5xl h-full bg-primary opacity-[0.03] blur-[120px] pointer-events-none"></div>
        
        <form id="doc-form" action="{{ if .ID }}/documents/edit?id={{ .ID }}{{ else }}/documents/new{{ end }}" method="POST" class="h-full relative z-10">
            <input type="hidden" name="folder_id" value="{{ .FolderID }}">
            <div class="doc-page max-w-4xl mx-auto min-h-full">
                <textarea name="content" id="content-editor" class="w-full h-full min-h-[800px] bg-transparent border-none resize-none focus:outline-none text-xl leading-relaxed text-slate-300 placeholder-slate-800" placeholder="The blank canvas awaits your brilliance..." {{ if .ID }} hx-post="/documents/autosave" hx-trigger="keyup changed delay:2s" hx-vals='{"id": "{{ .ID }}"}' hx-target="#save-status" {{ end }} required>{{ .Content }}</textarea>
            </div>
        </form>
    </div>
</div>

<script>
    lucide.createIcons();
    
    // Smooth auto-resize based on content
    const textarea = document.getElementById('content-editor');
    textarea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });
</script>

<style>
    #content-editor {
        font-family: 'Inter', sans-serif;
        scrollbar-width: none;
    }
    
    #content-editor::-webkit-scrollbar {
        display: none;
    }

    #content-editor::placeholder {
        font-weight: 800;
        letter-spacing: -0.02em;
    }
    
    .doc-editor-workspace {
        box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
    }
</style>
{{ end }}
