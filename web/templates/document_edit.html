{{ define "content" }}
<div class="doc-editor-container h-full flex flex-col">
    <div class="doc-editor-header flex items-center justify-between py-6 mb-8 border-b border-slate-200">
        <div class="flex items-center gap-6 flex-1">
            <a href="{{ if .FolderID }}/?folder_id={{ .FolderID }}{{ else }}/{{ end }}" class="btn btn-secondary btn-sm p-3">
                <i data-lucide="arrow-left" size="18"></i>
            </a>
            <div class="flex-1 max-w-2xl">
                <input type="text" form="doc-form" name="title" value="{{ .Title }}" class="bg-transparent border-none text-3xl font-bold text-slate-900 w-full focus:outline-none focus:ring-0" placeholder="Give your document a title..." required autofocus>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="save-status" class="text-xs font-semibold text-slate-400"></div>
            <button type="submit" form="doc-form" class="btn btn-primary h-11 px-8 rounded-xl shadow-lg">
                {{ if .ID }}Publish Changes{{ else }}Create Document{{ end }}
            </button>
        </div>
    </div>

    <div class="doc-editor-workspace flex-1 overflow-y-auto bg-slate-50 rounded-2xl border border-slate-200 p-12">
        <form id="doc-form" action="{{ if .ID }}/documents/edit?id={{ .ID }}{{ else }}/documents/new{{ end }}" method="POST" class="h-full">
            <input type="hidden" name="folder_id" value="{{ .FolderID }}">
            <div class="doc-page bg-white max-w-4xl mx-auto min-h-full rounded-xl shadow-xl border border-slate-200 p-16">
                <textarea name="content" id="content-editor" class="w-full h-full min-h-[800px] border-none resize-none focus:outline-none text-lg leading-relaxed text-slate-800 placeholder-slate-300" placeholder="Start your masterpiece here..." {{ if .ID }} hx-post="/documents/autosave" hx-trigger="keyup changed delay:2s" hx-vals='{"id": "{{ .ID }}"}' hx-target="#save-status" {{ end }} required>{{ .Content }}</textarea>
            </div>
        </form>
    </div>
</div>

<script>
    lucide.createIcons();
    
    // Auto-resize textarea to fill workspace (simplified)
    const textarea = document.getElementById('content-editor');
    textarea.addEventListener('input', () => {
        // Adjust if needed, but the current layout handles it via flex
    });
</script>

<style>
    /* Editor specific overrides to ensure clean white workspace */
    .doc-page {
        font-family: 'Inter', sans-serif;
    }
    
    #content-editor {
        font-family: 'Inter', sans-serif;
    }

    #content-editor::placeholder {
        font-weight: 300;
        opacity: 0.5;
    }
</style>
{{ end }}
