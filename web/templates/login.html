{{ define "content" }}
<div class="auth-container max-w-md mx-auto py-20 animate-fade-in">
    <div class="auth-card bg-white p-12 rounded-3xl shadow-2xl border border-slate-100 text-center">
        <div class="mb-10">
            <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center text-white text-3xl font-bold mx-auto mb-6 shadow-lg shadow-primary-glow">D</div>
            <h1 class="text-3xl font-bold text-slate-900 mb-2">Welcome Back</h1>
            <p class="text-slate-400">Continue your journey in DocuFlow</p>
        </div>

        <form action="/login" method="POST" class="text-left">
            <div class="form-group mb-6">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Username</label>
                <input type="text" name="username" class="form-input w-full h-12 bg-slate-50 border-slate-200 rounded-xl px-4 focus:ring-2 focus:ring-primary focus:bg-white transition-all" placeholder="yourname" required>
            </div>

            <div class="form-group mb-8">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Password</label>
                <input type="password" name="password" class="form-input w-full h-12 bg-slate-50 border-slate-200 rounded-xl px-4 focus:ring-2 focus:ring-primary focus:bg-white transition-all" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary w-full h-14 rounded-xl text-lg font-bold shadow-xl">Sign In</button>
        </form>

        <div class="mt-10 pt-8 border-t border-slate-50 text-slate-400 text-sm">
            New to the platform? <a href="/register" class="text-primary font-bold hover:underline">Create an account</a>
        </div>
    </div>
</div>
{{ end }}
