{{ define "content" }}
<div class="auth-wrapper fixed inset-0 flex items-center justify-center p-6">
    <!-- Animated Background Gradients -->
    <div class="auth-bg absolute inset-0 overflow-hidden -z-10 bg-slate-950">
        <div class="gradient-1 absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-accent-cyan opacity-10 blur-[150px] animate-pulse"></div>
        <div class="gradient-2 absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary opacity-10 blur-[150px]"></div>
    </div>

    <div class="auth-card w-full max-w-md glass-card p-12 rounded-[40px] border border-border shadow-2xl relative overflow-hidden fade-in">
        <div class="card-glow absolute inset-0 bg-gradient-to-br from-white/5 to-transparent pointer-events-none"></div>
        
        <div class="auth-header text-center mb-12 relative z-10">
            <div class="brand-logo w-20 h-20 text-4xl mx-auto mb-8 shadow-[0_0_40px_hsla(var(--primary-h),var(--primary-s),var(--primary-l),0.4)]">D</div>
            <h1 class="text-4xl font-extrabold text-main mb-3 tracking-tight">Create Access ID</h1>
            <p class="text-dim font-medium">Join the Obsidian knowledge network</p>
        </div>

        <form action="/register" method="POST" class="auth-form relative z-10">
            <div class="form-group mb-6">
                <label class="block text-[10px] font-black text-primary uppercase tracking-[0.2em] mb-3 ml-1">Choose Username</label>
                <div class="relative">
                    <i data-lucide="user-plus" class="absolute left-4 top-1/2 -translate-y-1/2 text-dim" size="18"></i>
                    <input type="text" name="username" class="form-input w-full h-14 pl-12 bg-slate-950/50 border-border focus:border-primary focus:bg-slate-900 transition-all rounded-2xl" placeholder="e.g. quantum_scribe" required>
                </div>
            </div>

            <div class="form-group mb-10">
                <label class="block text-[10px] font-black text-primary uppercase tracking-[0.2em] mb-3 ml-1">Define Master Passcode</label>
                <div class="relative">
                    <i data-lucide="shield-check" class="absolute left-4 top-1/2 -translate-y-1/2 text-dim" size="18"></i>
                    <input type="password" name="password" class="form-input w-full h-14 pl-12 bg-slate-950/50 border-border focus:border-primary focus:bg-slate-900 transition-all rounded-2xl" placeholder="••••••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-full h-16 rounded-2xl text-lg font-extrabold tracking-tight group overflow-hidden relative">
                <span class="relative z-10 flex items-center gap-3">
                    Initialize Account
                    <i data-lucide="sparkles" size="20" class="group-hover:rotate-12 transition-transform"></i>
                </span>
                <div class="btn-shine absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
            </button>
        </form>

        <div class="auth-footer mt-12 text-center relative z-10 pt-8 border-t border-border/50">
            <p class="text-dim text-sm font-medium">
                Already have an ID? 
                <a href="/login" class="text-main font-bold hover:text-primary transition-colors underline decoration-primary/30 underline-offset-4">Vault Login</a>
            </p>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
</script>

<style>
    .auth-wrapper {
        background: radial-gradient(circle at center, #0F172A 0%, #020617 100%);
    }

    .glass-card {
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(40px);
    }
    
    @keyframes pulse {
        0%, 100% { opacity: 0.1; }
        50% { opacity: 0.15; }
    }
    
    .animate-pulse {
        animation: pulse 4s ease-in-out infinite;
    }
</style>
{{ end }}
