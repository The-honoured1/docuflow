<div class="comments-container mt-12 bg-slate-900/30 rounded-3xl border border-border p-8">
    <div class="comments-header flex justify-between items-center mb-8">
        <h3 class="text-xl font-bold flex items-center gap-3">
            <i data-lucide="message-square" size="20" class="text-primary"></i>
            Discussion
        </h3>
        <span class="badge px-3 py-1 bg-surface-light text-dim border border-border">{{ len .Comments }} thoughts</span>
    </div>

    <form class="comment-form mb-10" hx-post="/comments/add" hx-target="closest .comments-section" hx-swap="innerHTML">
        <input type="hidden" name="document_id" value="{{ .DocumentID }}">
        <div class="form-group">
            <textarea name="content" class="form-input w-full min-h-[100px] p-4 bg-slate-950 border-border focus:border-primary rounded-2xl resize-none transition-all placeholder:text-slate-700" placeholder="Contribute to the intelligence pool..." required></textarea>
        </div>
        <div class="flex justify-end mt-4">
            <button type="submit" class="btn btn-primary h-11 px-8 rounded-xl shadow-lg">
                <i data-lucide="send" size="16"></i>
                Post Intelligence
            </button>
        </div>
    </form>

    {{ if .Comments }}
    <ul class="comment-list flex flex-col gap-4">
        {{ range .Comments }}
        <li class="comment-item p-6 bg-slate-950/50 rounded-2xl border border-border/50 hover:border-primary/20 transition-all">
            <div class="comment-header flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <div class="revision-avatar w-8 h-8 bg-primary rounded-lg flex items-center justify-center font-bold text-xs text-white">
                        {{ slice .Username 0 1 }}
                    </div>
                    <span class="font-bold text-main">{{ .Username }}</span>
                    <span class="text-[10px] text-dim uppercase tracking-widest">{{ .CreatedAt.Format "Jan 02 · 15:04" }}</span>
                </div>
                <form hx-post="/comments/delete" hx-target="closest .comments-section" hx-swap="innerHTML">
                    <input type="hidden" name="comment_id" value="{{ .ID }}">
                    <input type="hidden" name="document_id" value="{{ $.DocumentID }}">
                    <button type="submit" class="text-dim hover:text-error bg-transparent border-none p-2 cursor-pointer transition-colors" onclick="return confirm('Archive this thought?')">
                        <i data-lucide="x" size="14"></i>
                    </button>
                </form>
            </div>
            <p class="comment-body text-slate-300 leading-relaxed">{{ .Content }}</p>
        </li>
        {{ end }}
    </ul>
    {{ else }}
    <div class="empty-comments py-10 text-center">
        <div class="text-dim opacity-20 mb-4"><i data-lucide="message-circle-off" size="48"></i></div>
        <p class="text-dim text-sm italic">The void is silent. Start the discussion.</p>
    </div>
    {{ end }}
</div>

<script>
    lucide.createIcons();
</script>
