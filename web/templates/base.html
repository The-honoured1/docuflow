<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuFlow - Obsidian Documentation</title>
    <meta name="description" content="A premium collaborative documentation platform with Obsidian & Electric aesthetics.">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/" class="brand">
                    <div class="brand-logo">D</div>
                    <span class="brand-text">DocuFlow</span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <a href="/" class="sidebar-item active">
                    <i data-lucide="layout-grid" size="20"></i>
                    Workspace
                </a>
                <a href="/recent" class="sidebar-item">
                    <i data-lucide="zap" size="20"></i>
                    Recent
                </a>
                <a href="/starred" class="sidebar-item">
                    <i data-lucide="sparkles" size="20"></i>
                    Starred
                </a>
                <a href="/trash" class="sidebar-item">
                    <i data-lucide="trash" size="20"></i>
                    Archive
                </a>
            </nav>

            <div class="sidebar-footer" style="margin-top: auto;">
                <div class="user-card" style="padding: 16px; background: var(--surface-light); border-radius: 16px; border: 1px solid var(--border);">
                    {{ if .User }}
                    <div class="flex items-center gap-3">
                        <div class="user-avatar" style="width: 36px; height: 36px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; color: white;">
                            {{ slice .User 0 1 }}
                        </div>
                        <div class="user-info" style="flex: 1; overflow: hidden;">
                            <div class="user-name" style="font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ .User }}</div>
                            <div class="user-plan" style="font-size: 10px; color: var(--primary); font-weight: 700; text-transform: uppercase;">Pro Member</div>
                        </div>
                        <a href="/logout" title="Sign Out" style="color: var(--text-dim);"><i data-lucide="log-out" size="16"></i></a>
                    </div>
                    {{ else }}
                    <a href="/login" class="btn btn-primary btn-sm w-full">Sign In</a>
                    {{ end }}
                </div>
            </div>
        </aside>

        <div class="main-wrapper">
            <header class="top-bar">
                <div class="search-wrapper">
                    <form action="/search" method="GET" class="search-form">
                        <div class="search-input-group">
                            <i data-lucide="search" class="search-icon" size="18"></i>
                            <input type="text" name="q" placeholder="Search your knowledge base..." class="search-input">
                        </div>
                    </form>
                </div>

                <div class="top-actions flex items-center gap-4">
                    <button class="btn btn-ghost" style="padding: 0; width: 40px; height: 40px; border-radius: 12px;">
                        <i data-lucide="bell" size="20"></i>
                    </button>
                    <button class="btn btn-ghost" style="padding: 0; width: 40px; height: 40px; border-radius: 12px;">
                        <i data-lucide="settings" size="20"></i>
                    </button>
                    <div style="width: 1px; height: 24px; background: var(--border);"></div>
                    {{ if not .User }}
                    <a href="/register" class="btn btn-primary btn-sm">Get Started</a>
                    {{ end }}
                </div>
            </header>

            <main class="content-area fade-in">
                {{ template "content" . }}
            </main>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // Dynamic active state for navigation
        const currentPath = window.location.pathname;
        const navItems = document.querySelectorAll('.sidebar-item');
        navItems.forEach(item => {
            if (item.getAttribute('href') === currentPath) {
                navItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            }
        });
    </script>
</body>

</html>
