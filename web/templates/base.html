<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuFlow - Collaborative Documentation Platform</title>
    <meta name="description"
        content="A lightweight, server-rendered documentation platform for teams that want clarity, speed, and control.">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/" class="brand">
                    <span class="brand-logo">D</span>
                    <span class="brand-text">DocuFlow</span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <a href="/" class="sidebar-link active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    </svg>
                    My Drive
                </a>
                <a href="/recent" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                    Recent
                </a>
                <a href="/starred" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                    </svg>
                    Starred
                </a>
                <a href="/trash" class="sidebar-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                    </svg>
                    Trash
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="storage-card">
                    <div class="storage-info">
                        <span>Storage</span>
                        <span>75% used</span>
                    </div>
                    <div class="storage-bar">
                        <div class="storage-usage" style="width: 75%;"></div>
                    </div>
                    <a href="#" class="btn btn-ghost btn-sm">Upgrade Plan</a>
                </div>
            </div>
        </aside>

        <div class="main-wrapper">
            <header class="top-bar">
                <div class="search-container">
                    <form action="/search" method="GET" class="search-form">
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.35-4.35" />
                        </svg>
                        <input type="text" name="q" placeholder="Search in Drive" class="search-input">
                    </form>
                </div>

                <div class="top-bar-actions">
                    {{ if .User }}
                    <div class="user-profile">
                        <span class="user-name">{{ .User }}</span>
                        <a href="/logout" class="btn btn-ghost btn-sm">Logout</a>
                    </div>
                    {{ else }}
                    <a href="/login" class="btn btn-ghost btn-sm">Login</a>
                    <a href="/register" class="btn btn-primary btn-sm">Get Started</a>
                    {{ end }}
                </div>
            </header>

            <main class="content-area">
                {{ template "content" . }}
            </main>
        </div>
    </div>
</body>

</html>
