<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuFlow - Elevated Documentation</title>
    <meta name="description" content="A premium collaborative documentation platform.">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/" class="brand">
                    <span class="brand-logo">D</span>
                    <span class="brand-text">DocuFlow</span>
                </a>
            </div>

            <nav class="sidebar-nav">
                <a href="/" class="sidebar-item active">
                    <i data-lucide="hard-drive" size="20"></i>
                    My Drive
                </a>
                <a href="/recent" class="sidebar-item">
                    <i data-lucide="clock" size="20"></i>
                    Recent
                </a>
                <a href="/starred" class="sidebar-item">
                    <i data-lucide="star" size="20"></i>
                    Starred
                </a>
                <a href="/trash" class="sidebar-item">
                    <i data-lucide="trash-2" size="20"></i>
                    Trash
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="storage-card">
                    <h4 class="storage-title">Storage</h4>
                    <div class="storage-bar">
                        <div class="storage-usage" style="width: 75%;"></div>
                    </div>
                    <div class="flex justify-between items-center mt-2">
                        <span class="storage-text">75% of 2GB used</span>
                        <a href="#" class="btn btn-ghost btn-sm" style="padding: 0; height: auto;">Upgrade</a>
                    </div>
                </div>
            </div>
        </aside>

        <div class="main-wrapper">
            <header class="top-bar">
                <div class="search-wrapper">
                    <form action="/search" method="GET" class="search-form">
                        <div class="search-input-group">
                            <i data-lucide="search" class="search-icon" size="18"></i>
                            <input type="text" name="q" placeholder="Search your knowledge..." class="search-input">
                        </div>
                    </form>
                </div>

                <div class="user-nav">
                    {{ if .User }}
                    <div class="flex items-center gap-3">
                        <span class="user-name text-sm font-semibold">{{ .User }}</span>
                        <div class="user-avatar">{{ if .User }}{{ slice .User 0 1 }}{{ end }}</div>
                        <a href="/logout" class="btn btn-ghost btn-sm">Sign Out</a>
                    </div>
                    {{ else }}
                    <a href="/login" class="btn btn-ghost btn-sm">Log In</a>
                    <a href="/register" class="btn btn-primary btn-sm">Get Started</a>
                    {{ end }}
                </div>
            </header>

            <main class="content-area fade-in">
                {{ template "content" . }}
            </main>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
