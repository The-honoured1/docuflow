name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/docuflow-${{ matrix.suffix }} .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: docuflow-${{ matrix.suffix }}
          path: dist/docuflow-${{ matrix.suffix }}

  publish:
    name: Publish GitHub Release
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DocuFlow ${{ github.ref_name }}
          body: |
            ## DocuFlow ${{ github.ref_name }}

            ### What's included
            - 📄 Document CRUD with Markdown support
            - 📎 File attachment workflow (upload / download / delete)
            - 🔒 Optional password protection per document
            - 🔗 Shareable public links with optional password gate
            - 🕒 Revision history & rollback
            - 💬 Comments
            - 🔍 Full-text search

            ### Running
            ```bash
            # Linux / macOS
            chmod +x docuflow-linux-amd64
            ./docuflow-linux-amd64

            # Then open http://localhost:8080
            ```

            > **Note:** The `web/` folder must be in the same directory as the binary
            > (it contains templates and static assets).
          files: dist/*
          draft: false
          prerelease: false
